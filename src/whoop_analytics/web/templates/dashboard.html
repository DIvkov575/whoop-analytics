<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whoop Causal Analytics</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f23; color: #e0e0e0; min-height: 100vh; }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; border-bottom: 1px solid #222; }
  nav h1 { font-size: 1.2rem; color: #fff; }
  nav a { color: #999; text-decoration: none; font-size: 0.9rem; }
  nav a:hover { color: #fff; }
  .main { max-width: 800px; margin: 60px auto; padding: 0 24px; text-align: center; }
  .main h2 { font-size: 1.8rem; color: #fff; margin-bottom: 16px; }
  .main p { color: #999; margin-bottom: 32px; line-height: 1.6; }
  .btn { display: inline-block; padding: 14px 32px; background: #4CAF50; color: #fff; text-decoration: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; border: none; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #388E3C; }
  form { display: inline; }
  .error { background: #2d1b1b; border: 1px solid #5c2020; border-radius: 8px; padding: 16px; margin-bottom: 24px; color: #f88; }
</style>
</head>
<body>
<nav>
  <h1>Whoop Causal Analytics</h1>
  <a href="/logout">Disconnect</a>
</nav>
<div class="main">
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <h2>Ready to Analyze</h2>
  <p>This will fetch your last 180 days of Whoop data, run causal discovery (PCMCI), and estimate what drives your brain fog.</p>

  <form method="post" action="/analyze">
    <button type="submit" class="btn">Fetch Data & Run Analysis</button>
  </form>

  {% if has_data %}
  <p style="margin-top: 24px;"><a href="/results" style="color: #4CAF50;">View latest results &rarr;</a></p>
  {% endif %}
</div>
</body>
</html>
